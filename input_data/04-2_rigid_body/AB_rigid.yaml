# A 为组 1、B 为组 2 —— 各自结构已知，但 A-B 相对位置不给，由模型自己对接
entities:
  - protein:
      id: G
      sequence: 20              # 凑数的设计肽（BoltzGen 必须有东西可设计）
  - file:
      path: 1g13.cif
      include:
        - chain:
            id: A
        - chain:
            id: B
      binding_types:
        - chain:
            id: A
            binding: 59..62     # 把设计肽拴在这里，距 A-B 界面 30 埃，避免干扰
      structure_groups:
        - group:
            id: A
            visibility: 1
        - group:
            id: B
            visibility: 2       # ← 独立刚体组
